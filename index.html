<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#002856">
  <title>Capitan Control</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --navy: #002856;
      --navy-2: #001b3d;
      --blue: #0757b7;
      --blue-soft: #eaf3ff;
      --gold: #d9a441;
      --green: #138a52;
      --purple: #6f42c1;
      --ink: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --panel: #ffffff;
      --bg: #f6f8fb;
      --danger: #b42318;
      --shadow: 0 12px 32px rgba(16, 24, 40, .08);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); color: var(--ink); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-size: 14px;
      letter-spacing: 0;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 250px 1fr; }
    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      color: #fff;
      background: linear-gradient(180deg, var(--navy), var(--navy-2));
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand { display: flex; align-items: center; gap: 12px; padding: 0 6px; }
    .brand-mark {
      width: 46px; height: 46px; border: 2px solid rgba(255,255,255,.9);
      border-radius: 50%; display: grid; place-items: center; font-size: 26px; font-weight: 800;
    }
    .brand-title { font-size: 18px; font-weight: 800; line-height: 1.05; text-transform: uppercase; }
    .brand-sub { font-size: 10px; color: rgba(255,255,255,.7); margin-top: 3px; }
    .nav { display: grid; gap: 6px; }
    .nav button {
      height: 46px;
      border: 0;
      border-radius: var(--radius);
      color: rgba(255,255,255,.85);
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      text-align: left;
    }
    .nav button svg, .icon svg { width: 18px; height: 18px; stroke-width: 2; }
    .nav button.active { background: var(--blue); color: #fff; box-shadow: 0 8px 24px rgba(7,87,183,.35); }
    .side-foot {
      margin-top: auto;
      display: grid;
      gap: 10px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      width: fit-content; min-height: 30px; padding: 6px 10px;
      border-radius: 999px; background: rgba(255,255,255,.1); font-size: 12px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }
    .dot.off { background: var(--gold); }
    .main { min-width: 0; padding: 30px 28px 92px; }
    .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.12; }
    h2 { margin: 0 0 6px; font-size: 19px; }
    h3 { margin: 0; font-size: 16px; }
    p { margin: 0; color: var(--muted); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .btn, .chip, .input, select, textarea {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 0 14px;
      font-weight: 700;
    }
    .btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .btn.blue { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn.ghost { background: transparent; }
    .btn.danger { color: var(--danger); border-color: #f4c7c3; background: #fff7f6; }
    .btn.icon-only { width: 42px; padding: 0; }
    .grid { display: grid; gap: 18px; }
    .stats { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 22px; }
    .stat, .panel, .quick {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .stat { padding: 20px; display: grid; gap: 12px; min-height: 140px; }
    .stat-head { display: flex; align-items: center; gap: 12px; color: var(--muted); }
    .bubble { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; }
    .bubble.blue { color: var(--blue); background: var(--blue-soft); }
    .bubble.green { color: var(--green); background: #eaf8f0; }
    .bubble.gold { color: #a66b00; background: #fff4dc; }
    .bubble.purple { color: var(--purple); background: #f3eaff; }
    .stat strong { font-size: 26px; color: var(--navy); }
    .content-grid { grid-template-columns: minmax(310px, .88fr) minmax(360px, 1.12fr); align-items: start; }
    .panel { padding: 20px; min-width: 0; }
    .form { display: grid; gap: 14px; margin-top: 18px; }
    .field { display: grid; gap: 7px; min-width: 0; }
    label { font-size: 13px; font-weight: 750; color: #182230; }
    input, select, textarea {
      width: 100%;
      padding: 0 12px;
      outline: 0;
      color: var(--ink);
    }
    textarea { min-height: 84px; padding-top: 11px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(7,87,183,.12); }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .actions { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
    .receipt {
      margin-top: 18px;
      background: #fff;
      border: 1px solid #1d2939;
      min-height: 610px;
      padding: 34px 28px;
      font-family: Georgia, "Times New Roman", serif;
      color: #101828;
      line-height: 1.65;
    }
    .receipt h3 { text-align: center; font-size: 17px; margin-bottom: 22px; font-family: inherit; }
    .receipt .line { border-bottom: 1px solid #344054; display: inline-block; min-width: 120px; text-align: center; font-weight: 700; }
    .receipt .sign { width: 220px; border-top: 1px solid #344054; text-align: center; margin: 56px auto 0; padding-top: 4px; }
    .receipt-photo { max-width: 120px; max-height: 80px; display: block; margin-top: 8px; border: 1px solid var(--line); }
    .receipt-signature { max-width: 220px; max-height: 70px; display: block; margin: 36px auto 0; }
    .table-wrap { overflow: auto; border: 1px solid var(--line); border-radius: var(--radius); margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; background: #fff; }
    th, td { padding: 13px 14px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { color: #344054; background: #f9fafb; font-size: 12px; text-transform: uppercase; letter-spacing: .02em; }
    tr:last-child td { border-bottom: 0; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--blue-soft);
      color: var(--navy); display: inline-grid; place-items: center; font-weight: 800; margin-right: 8px;
    }
    .section { display: none; }
    .section.active { display: block; }
    .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); margin-top: 22px; }
    .quick { padding: 16px; display: flex; align-items: center; gap: 12px; min-height: 74px; border: 0; text-align: left; }
    .quick span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .search-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-top: 14px; }
    .search-row .input { max-width: 310px; padding-left: 12px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 6px; }
    .chip { padding: 0 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 750; }
    .chip.active { background: var(--blue-soft); border-color: #bdd7ff; color: var(--blue); }
    .drawer {
      position: fixed; inset: 0; z-index: 30; display: none; align-items: flex-end; background: rgba(0,0,0,.28);
    }
    .drawer.open { display: flex; }
    .modal {
      width: min(720px, calc(100vw - 28px)); max-height: min(86vh, 760px); overflow: auto;
      margin: auto; background: #fff; border-radius: var(--radius); padding: 22px; box-shadow: 0 24px 80px rgba(0,0,0,.22);
    }
    .toast {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      background: var(--navy); color: #fff; border-radius: var(--radius); padding: 12px 14px;
      box-shadow: var(--shadow); display: none; z-index: 40; max-width: calc(100vw - 28px);
    }
    .toast.show { display: block; }
    .login-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      min-height: 100vh;
      padding: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--navy), var(--navy-2));
      color: #fff;
    }
    .login-gate.hidden { display: none; }
    .login-card {
      width: min(430px, 100%);
      background: #fff;
      color: var(--ink);
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(0,0,0,.24);
      padding: 24px;
    }
    .login-card .brand { color: var(--navy); padding: 0; margin-bottom: 22px; }
    .login-card .brand-mark { border-color: var(--navy); }
    .login-card .brand-sub { color: var(--muted); }
    .login-status { min-height: 20px; margin-top: 10px; color: var(--danger); font-weight: 700; }
    .mobile-nav {
      position: fixed; left: 0; right: 0; bottom: 0; display: none; z-index: 20;
      background: #fff; border-top: 1px solid var(--line); padding: 8px max(10px, env(safe-area-inset-left)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-right));
    }
    .mobile-nav button {
      border: 0; background: transparent; color: var(--muted); display: grid; justify-items: center; gap: 4px; font-size: 10px;
    }
    .mobile-nav button.active { color: var(--blue); }
    .chart { width: 100%; height: 240px; display: block; margin-top: 16px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
    .note { padding: 12px; border-radius: var(--radius); background: var(--blue-soft); color: #194185; margin-top: 14px; }
    .schema {
      white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; background: #0b1220;
      color: #d8e7ff; padding: 14px; border-radius: var(--radius); overflow: auto; font-size: 12px;
    }
    .signature-pad {
      width: 100%;
      height: 150px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      touch-action: none;
      display: block;
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-nav { display: grid; grid-template-columns: repeat(5, 1fr); }
      .main { padding: 22px 14px 92px; }
      .stats, .quick-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .content-grid { grid-template-columns: 1fr; }
      .topbar { align-items: stretch; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
    }
    @media (max-width: 620px) {
      h1 { font-size: 23px; }
      .stats, .quick-grid, .two { grid-template-columns: 1fr; }
      .panel { padding: 16px; }
      .receipt { min-height: 520px; padding: 24px 18px; font-size: 13px; }
      .actions, .search-row { align-items: stretch; flex-direction: column; }
      .search-row .input, .btn { width: 100%; }
      .btn.icon-only { width: 42px; }
    }
    @media print {
      body * { visibility: hidden; }
      .receipt, .receipt * { visibility: visible; }
      .receipt { position: absolute; inset: 0; border: 0; min-height: auto; box-shadow: none; }
      .mobile-nav, .sidebar, .topbar, .actions, .note { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="login-gate" id="loginGate">
    <div class="login-card">
      <div class="brand">
        <div class="brand-mark">⚓</div>
        <div>
          <div class="brand-title">Capitan<br>Control</div>
          <div class="brand-sub">Control de dinero a bordo</div>
        </div>
      </div>
      <form class="form" id="gateLoginForm">
        <div class="field"><label>Correo</label><input name="email" type="email" autocomplete="username" required></div>
        <div class="field"><label>Password</label><input name="password" type="password" autocomplete="current-password" required></div>
        <button class="btn primary" style="width:100%">Login</button>
        <div class="login-status" id="loginStatus"></div>
      </form>
    </div>
  </div>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">⚓</div>
        <div>
          <div class="brand-title">Capitan<br>Control</div>
          <div class="brand-sub" data-i18n="brandSub">Control de dinero a bordo</div>
        </div>
      </div>
      <nav class="nav" id="sideNav"></nav>
      <div class="side-foot">
        <div class="status-pill"><span class="dot" id="netDot"></span><span id="netText">Online</span></div>
        <div class="status-pill"><span id="syncCount">0</span><span data-i18n="pendingSync">pendientes de sincronizar</span></div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle"></h1>
          <p id="pageSub"></p>
        </div>
        <div class="toolbar">
          <button class="btn" id="langBtn" title="Cambiar idioma">ES / EN</button>
          <button class="btn" id="supabaseBtn" title="Configurar Supabase"></button>
          <button class="btn primary" data-go="payments" id="newPaymentTop"></button>
        </div>
      </div>

      <section class="section active" id="dashboard"></section>
      <section class="section" id="payments"></section>
      <section class="section" id="receipts"></section>
      <section class="section" id="crew"></section>
      <section class="section" id="catalogs"></section>
      <section class="section" id="reports"></section>
      <section class="section" id="settings"></section>
    </main>
  </div>

  <nav class="mobile-nav" id="mobileNav"></nav>

  <div class="drawer" id="modal">
    <div class="modal">
      <div class="topbar" style="margin-bottom:14px">
        <div><h2 id="modalTitle"></h2><p id="modalSub"></p></div>
        <button class="btn icon-only" id="closeModal" title="Cerrar"></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

    function setupSignaturePad() {
      const canvas = document.getElementById('sigPad');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#101828';
      let drawing = false;
      const point = event => {
        const rect = canvas.getBoundingClientRect();
        const touch = event.touches ? event.touches[0] : event;
        return { x: (touch.clientX - rect.left) * canvas.width / rect.width, y: (touch.clientY - rect.top) * canvas.height / rect.height };
      };
      const start = event => {
        event.preventDefault();
        drawing = true;
        const p = point(event);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      };
      const move = event => {
        if (!drawing) return;
        event.preventDefault();
        const p = point(event);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        canvas.dataset.signed = 'true';
        updateReceiptPreview();
      };
      const stop = () => { drawing = false; };
      canvas.addEventListener('mousedown', start);
      canvas.addEventListener('mousemove', move);
      window.addEventListener('mouseup', stop);
      canvas.addEventListener('touchstart', start, { passive: false });
      canvas.addEventListener('touchmove', move, { passive: false });
      canvas.addEventListener('touchend', stop);
      document.getElementById('clearSig')?.addEventListener('click', clearSignaturePad);
    }
    function clearSignaturePad() {
      const canvas = document.getElementById('sigPad');
      if (!canvas) return;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      delete canvas.dataset.signed;
      updateReceiptPreview();
    }

    function paymentsTable(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>#</th><th>${t('date')}</th><th>${t('sailor')}</th><th>${t('vessel')}</th><th>${t('captain')}</th><th>${t('concept')}</th><th>${t('total')}</th></tr></thead><tbody>${rows.map(p => `<tr><td>${p.number}</td><td>${p.date}</td><td>${escapeHtml(p.sailorName)}</td><td>${escapeHtml(p.vessel)}</td><td>${escapeHtml(p.captain)}</td><td>${escapeHtml(p.concept)}</td><td>${money(p.total)}</td></tr>`).join('') || `<tr><td colspan="7">Sin datos</td></tr>`}</tbody></table></div>`;

    function drawChart(rows) {
      const canvas = document.getElementById('reportChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const group = rows.reduce((m,p)=>{m[p.concept]=(m[p.concept]||0)+paymentTotal(p);return m;},{});
      const entries = Object.entries(group).slice(0,8);
      const max = Math.max(1, ...entries.map(e=>e[1]));
      ctx.fillStyle = '#101828'; ctx.font = '16px sans-serif'; ctx.fillText(state.lang === 'es' ? 'Pagos por concepto' : 'Payments by concept', 24, 32);
      entries.forEach(([label,value], i) => {
        const y = 60 + i * 24;
        ctx.fillStyle = '#eaf3ff'; ctx.fillRect(150, y - 14, 680, 16);
        ctx.fillStyle = i % 2 ? '#0757b7' : '#002856'; ctx.fillRect(150, y - 14, 680 * value / max, 16);
        ctx.fillStyle = '#344054'; ctx.font = '12px sans-serif'; ctx.fillText(label, 24, y); ctx.fillText(money(value), 840, y);
      });
    }

    function sqlSchema() {
      return `create table captains (id text primary key, auth_user_id uuid unique, name text not null, phone text, email text);
create table vessels (id text primary key, captain_id text references captains(id), name text not null, captain text, season text);
create table crew (id text primary key, captain_id text references captains(id), vessel_id text references vessels(id), name text not null, dni text, phone text, vessel text, role text, active boolean default true);
create table roles (value text primary key);
create table concepts (value text primary key);
create table admin_users (auth_user_id uuid primary key, name text);
create table payments (
  id text primary key,
  captain_id text references captains(id),
  vessel_id text references vessels(id),
  number text unique,
  sailor_name text not null,
  dni text,
  vessel text,
  captain text,
  concept text,
  date date,
  quantity numeric,
  price numeric,
  total numeric,
  notes text,
  photo text,
  signature text,
  created_at timestamptz default now()
);
create table audit (id text primary key, action text, detail text, role text, at timestamptz default now());

alter table captains enable row level security;
alter table vessels enable row level security;
alter table crew enable row level security;
alter table payments enable row level security;
alter table admin_users enable row level security;

create policy "admin sees own admin row" on admin_users
  for select using (auth.uid() = auth_user_id);

create policy "admins manage captains" on captains
  for all using (exists (select 1 from admin_users where auth_user_id = auth.uid()))
  with check (exists (select 1 from admin_users where auth_user_id = auth.uid()));

create policy "admins manage vessels" on vessels
  for all using (exists (select 1 from admin_users where auth_user_id = auth.uid()))
  with check (exists (select 1 from admin_users where auth_user_id = auth.uid()));

create policy "admins manage crew" on crew
  for all using (exists (select 1 from admin_users where auth_user_id = auth.uid()))
  with check (exists (select 1 from admin_users where auth_user_id = auth.uid()));

create policy "admins manage payments" on payments
  for all using (exists (select 1 from admin_users where auth_user_id = auth.uid()))
  with check (exists (select 1 from admin_users where auth_user_id = auth.uid()));

create policy "captain sees own profile" on captains
  for select using (auth.uid() = auth_user_id);

create policy "captain sees own vessels" on vessels
  for select using (captain_id in (select id from captains where auth_user_id = auth.uid()));

create policy "captain manages own crew" on crew
  for all using (captain_id in (select id from captains where auth_user_id = auth.uid()))
  with check (captain_id in (select id from captains where auth_user_id = auth.uid()));

create policy "captain manages own payments" on payments
  for all using (captain_id in (select id from captains where auth_user_id = auth.uid()))
  with check (captain_id in (select id from captains where auth_user_id = auth.uid()));`;
    }

    function exportCsv(rows = visiblePayments()) {
      const header = ['number','date','sailorName','dni','vessel','captain','concept','quantity','price','total','notes'];
      const csv = [header.join(','), ...rows.map(p => header.map(h => `"${String(p[h] ?? '').replace(/"/g,'""')}"`).join(','))].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'reporte-pagos.csv';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function setupSupabase() {
      if (!state.config.url || !state.config.key || !window.supabase) return null;
      state.supabase = window.supabase.createClient(state.config.url, state.config.key);
      return state.supabase;
    }
    function friendlySupabaseError(error) {
      const message = error?.message || String(error || '');
      if (/invalid api key/i.test(message)) {
        return state.lang === 'es'
          ? 'API key invalida. Copia la publishable key o anon key correcta de Supabase y reemplaza APP_SUPABASE_CONFIG.key en index.html.'
          : 'Invalid API key. Copy the correct publishable key or anon key from Supabase and replace APP_SUPABASE_CONFIG.key in index.html.';
      }
      return message;
    }
    async function hydrateSession() {
      const client = state.supabase || setupSupabase();
      if (!client) return;
      const { data } = await client.auth.getSession();
      state.session = data.session;
      updateAuthGate();
      if (!state.session) return;
      await applySessionScope();
      await loadSupabaseData();
      startRealtime();
    }
    async function applySessionScope() {
      const userId = state.session?.user?.id;
      if (!userId) return;
      const client = state.supabase || setupSupabase();
      if (!client) return;
      const { data: adminRow } = await client.from('admin_users').select('*').eq('auth_user_id', userId).maybeSingle();
      if (adminRow) {
        state.config.role = 'Administrador';
        localStorage.setItem('cc_config', JSON.stringify(state.config));
        return;
      }
      const captain = state.db.captains.find(c => c.authUserId === userId);
      if (captain) {
        state.config.role = 'Capitan';
        state.config.captainId = captain.id;
        localStorage.setItem('cc_config', JSON.stringify(state.config));
        return;
      }
      const { data, error } = await client.from('captains').select('*').eq('auth_user_id', userId).maybeSingle();
      if (!error && data) {
        const mapped = { id: data.id, authUserId: data.auth_user_id, name: data.name, phone: data.phone, email: data.email };
        const existing = state.db.captains.findIndex(c => c.id === mapped.id);
        if (existing >= 0) state.db.captains[existing] = { ...state.db.captains[existing], ...mapped };
        else state.db.captains.push(mapped);
        state.config.role = 'Capitan';
        state.config.captainId = mapped.id;
        localStorage.setItem('cc_config', JSON.stringify(state.config));
        persist();
      }
    }
    async function loadSupabaseData() {
      const client = state.supabase || setupSupabase();
      if (!client || !state.session) return;
      const [captainsRes, vesselsRes, crewRes, paymentsRes, rolesRes, conceptsRes] = await Promise.all([
        client.from('captains').select('*'),
        client.from('vessels').select('*'),
        client.from('crew').select('*'),
        client.from('payments').select('*').order('created_at', { ascending: false }),
        client.from('roles').select('*'),
        client.from('concepts').select('*')
      ]);
      if (!captainsRes.error && captainsRes.data?.length) {
        state.db.captains = captainsRes.data.map(c => ({ id: c.id, authUserId: c.auth_user_id, name: c.name, phone: c.phone, email: c.email }));
      }
      if (!vesselsRes.error && vesselsRes.data?.length) {
        state.db.vessels = vesselsRes.data.map(v => ({ id: v.id, captainId: v.captain_id, name: v.name, captain: v.captain, season: v.season }));
      }
      if (!crewRes.error && crewRes.data) {
        state.db.crew = crewRes.data.map(mapCrewRow);
      }
      if (!paymentsRes.error && paymentsRes.data) {
        state.db.payments = paymentsRes.data.map(mapPaymentRow);
      }
      if (!rolesRes.error && rolesRes.data?.length) state.db.roles = rolesRes.data.map(r => r.value);
      if (!conceptsRes.error && conceptsRes.data?.length) state.db.concepts = conceptsRes.data.map(c => c.value);
      persist();
      renderView();
    }
    function mapCrewRow(c) {
      return { id: c.id, captainId: c.captain_id, vesselId: c.vessel_id, name: c.name, dni: c.dni, phone: c.phone, vessel: c.vessel, role: c.role, active: c.active };
    }
    function mapPaymentRow(p) {
      return {
        id: p.id,
        captainId: p.captain_id,
        vesselId: p.vessel_id,
        number: p.number,
        sailorName: p.sailor_name,
        dni: p.dni,
        vessel: p.vessel,
        captain: p.captain,
        concept: p.concept,
        date: p.date,
        quantity: p.quantity,
        price: p.price,
        total: p.total,
        notes: p.notes,
        photo: p.photo,
        signature: p.signature,
        createdAt: p.created_at,
        synced: true
      };
    }
    function upsertById(list, item) {
      const index = list.findIndex(row => row.id === item.id);
      if (index >= 0) list[index] = { ...list[index], ...item };
      else list.unshift(item);
    }
    function startRealtime() {
      const client = state.supabase || setupSupabase();
      if (!client || !state.session) return;
      if (state.realtimeChannel) client.removeChannel(state.realtimeChannel);
      state.realtimeChannel = client
        .channel('capitan-control-live')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'payments' }, payload => {
          if (payload.eventType === 'DELETE') state.db.payments = state.db.payments.filter(p => p.id !== payload.old.id);
          else upsertById(state.db.payments, mapPaymentRow(payload.new));
          persist();
          renderView();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'crew' }, payload => {
          if (payload.eventType === 'DELETE') state.db.crew = state.db.crew.filter(c => c.id !== payload.old.id);
          else upsertById(state.db.crew, mapCrewRow(payload.new));
          persist();
          renderView();
        })
        .subscribe();
    }
    async function signInSupabase(email, password) {
      const client = state.supabase || setupSupabase();
      if (!client) {
        const msg = state.lang === 'es' ? 'No se pudo conectar con Supabase.' : 'Could not connect to Supabase.';
        setLoginMessage(msg);
        return toast(msg);
      }
      state.session = null;
      state.config.role = 'Consulta';
      localStorage.setItem('cc_config', JSON.stringify(state.config));
      updateAuthGate();
      renderView();
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) {
        const msg = friendlySupabaseError(error);
        setLoginMessage(msg);
        return toast(msg);
      }
      state.session = data.session;
      updateAuthGate();
      setLoginMessage('');
      await applySessionScope();
      await loadSupabaseData();
      startRealtime();
      toast('Login OK');
      go('dashboard');
    }
    async function signOutSupabase() {
      const client = state.supabase || setupSupabase();
      if (client && state.realtimeChannel) client.removeChannel(state.realtimeChannel);
      state.realtimeChannel = null;
      if (client) await client.auth.signOut();
      state.session = null;
      updateAuthGate();
      toast('Sesion cerrada');
      renderView();
    }
    async function syncSupabase(forceToast = false) {
      const client = state.supabase || setupSupabase();
      if (!client || !navigator.onLine) {
        if (forceToast) toast(state.lang === 'es' ? 'Configura Supabase y verifica internet' : 'Configure Supabase and check internet');
        return;
      }
      if (isAdmin()) {
        await client.from('captains').upsert(state.db.captains.map(c => ({ id: c.id, auth_user_id: c.authUserId || null, name: c.name, phone: c.phone, email: c.email })));
        await client.from('vessels').upsert(state.db.vessels.map(v => ({ id: v.id, captain_id: v.captainId, name: v.name, captain: v.captain, season: v.season })));
        await client.from('roles').upsert(state.db.roles.map(value => ({ value })));
        await client.from('concepts').upsert(state.db.concepts.map(value => ({ value })));
      }
      await client.from('crew').upsert(visibleCrew().map(c => ({ id: c.id, captain_id: c.captainId, vessel_id: c.vesselId, name: c.name, dni: c.dni, phone: c.phone, vessel: c.vessel, role: c.role, active: c.active })));
      const pending = visiblePayments().filter(p => !p.synced);
      if (!pending.length) {
        if (forceToast) toast(t('synced'));
        return;
      }
      const payload = pending.map(p => ({
        id: p.id, captain_id: p.captainId, vessel_id: p.vesselId, number: p.number, sailor_name: p.sailorName, dni: p.dni, vessel: p.vessel,
        captain: p.captain, concept: p.concept, date: p.date, quantity: p.quantity,
        price: p.price, total: p.total, notes: p.notes, photo: p.photo, signature: p.signature, created_at: p.createdAt
      }));
      const { error } = await client.from('payments').upsert(payload);
      if (error) {
        toast(error.message);
        return;
      }
      pending.forEach(p => p.synced = true);
      recordAudit('sync.payments', `${pending.length} ${t('receipts')}`);
      persist();
      if (forceToast) toast(t('synced'));
    }
    function updateSyncCount() {
      document.getElementById('syncCount').textContent = visiblePayments().filter(p => !p.synced).length;
    }
    function updateNet() {
      document.getElementById('netDot').classList.toggle('off', !navigator.onLine);
      document.getElementById('netText').textContent = navigator.onLine ? t('connected') : t('offline');
      if (navigator.onLine) syncSupabase();
    }

    function renderView() {
      document.querySelectorAll('[data-i18n]').forEach(el => el.textContent = t(el.dataset.i18n));
      document.getElementById('supabaseBtn').innerHTML = icon('settings') + t('configure');
      document.getElementById('newPaymentTop').innerHTML = icon('plus') + t('newPayment');
      document.getElementById('closeModal').innerHTML = icon('close');
      if (state.view === 'dashboard') renderDashboard();
      if (state.view === 'payments') renderPayments();
      if (state.view === 'receipts') renderReceipts();
      if (state.view === 'crew') renderCrew();
      if (state.view === 'catalogs') renderCatalogs();
      if (state.view === 'reports') renderReports();
      if (state.view === 'settings') renderSettings();
      updateNet();
      updateSyncCount();
    }

    document.addEventListener('click', event => {
      const goButton = event.target.closest('[data-go]');
      if (goButton) go(goButton.dataset.go);
    });
    document.getElementById('langBtn').addEventListener('click', () => {
      state.lang = state.lang === 'es' ? 'en' : 'es';
      localStorage.setItem('cc_lang', state.lang);
      go(state.view);
    });
    document.getElementById('supabaseBtn').addEventListener('click', () => go('settings'));
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
    document.getElementById('gateLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      setLoginMessage('');
      const data = Object.fromEntries(new FormData(e.target));
      await signInSupabase(data.email, data.password);
    });
    window.addEventListener('online', updateNet);
    window.addEventListener('offline', updateNet);

    setupSupabase();
    updateAuthGate();
    hydrateSession();
    renderNav();
    go('dashboard');
  </script>
</body>
</html>
